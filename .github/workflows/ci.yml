name: CI

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
  workflow_call:

jobs:
  glicko2:
    name: glicko2 / py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Ruff
        run: uv run ruff check packages/glicko2/src packages/glicko2/tests

      - name: Mypy
        run: uv run mypy packages/glicko2/src

      - name: Pytest
        run: uv run pytest packages/glicko2/tests -q

      - name: Build package
        run: uv build --package glicko2-py

      - name: Smoke test built wheel
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install dist/glicko2_py-*.whl
          /tmp/smoke/bin/python -c "from glicko2 import RatingEngine, MatchResult, RatingPeriod; print('smoke test OK')"

  docs:
    name: docs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install docs dependencies
        working-directory: docs
        run: npm ci

      - name: Build docs
        working-directory: docs
        run: npm run build
