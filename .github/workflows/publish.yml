name: Publish glicko2-py to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write

jobs:
  ci:
    name: CI gate
    uses: ./.github/workflows/ci.yml

  publish:
    name: Build and publish to PyPI
    needs: ci
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(python -c "
          import re
          with open('packages/glicko2/pyproject.toml') as f:
              match = re.search(r'version\s*=\s*\"(.+?)\"', f.read())
              print(match.group(1))
          ")
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG) does not match pyproject.toml version ($PKG_VERSION)"
            exit 1
          fi
          echo "Version check passed: $TAG"

      - name: Build package
        run: uv build --package glicko2-py

      - name: Smoke test built wheel
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install dist/glicko2_py-*.whl
          /tmp/smoke/bin/python -c "from glicko2 import RatingEngine, MatchResult, RatingPeriod; print('smoke test OK')"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1
