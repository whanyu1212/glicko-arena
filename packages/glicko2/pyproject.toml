[project]
name = "glicko2"
version = "0.1.0"
description = "Pure Glicko-2 rating system — standalone library"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = []

[project.optional-dependencies]
postgres = ["psycopg[binary]>=3.1"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["glicko2"]
